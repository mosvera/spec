name: Documentation improvement
description: Suggest a correction or clarification to Mosvera documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: page
    attributes:
      label: Affected document
      description: Link or path to the document.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed improvement
      description: Suggested wording is welcome, but not required.
